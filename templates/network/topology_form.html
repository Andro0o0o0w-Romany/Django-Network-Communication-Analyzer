{% extends 'base.html' %}
{% block title %}{{ action }} Network{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'network:topology_list' %}">Networks</a></li>
<li class="breadcrumb-item active">{{ action }} Network</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="page-header">
            <h1><i class="fa-solid fa-diagram-project me-2" style="color: var(--accent)"></i>{{ action }} Network</h1>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Network Name *</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Campus Network Alpha" required
                               value="{{ topology.name|default:'' }}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Describe this network topology...">{{ topology.description|default:'' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-check me-1"></i> {{ action }} Network
                        </button>
                        <a href="{% if topology %}{% url 'network:topology_detail' topology.pk %}{% else %}{% url 'network:topology_list' %}{% endif %}"
                           class="btn btn-ghost">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
