{% extends 'base.html' %}
{% block title %}{{ action }} Ruleset{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'rules:ruleset_list' %}">Rulesets</a></li>
<li class="breadcrumb-item active">{{ action }}</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="page-header">
            <h1><i class="fa-solid fa-sliders me-2" style="color: var(--accent-purple)"></i>{{ action }} Ruleset</h1>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Ruleset Name *</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Production Standards" required
                               value="{{ ruleset.name|default:'' }}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Describe this ruleset...">{{ ruleset.description|default:'' }}</textarea>
                    </div>
                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_default" id="isDefault"
                                   {% if ruleset.is_default %}checked{% endif %}>
                            <label class="form-check-label" for="isDefault" style="font-size:13px">
                                Set as default ruleset
                                <div class="form-text">Default rulesets are pre-selected when running analysis.</div>
                            </label>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-check me-1"></i> {{ action }} Ruleset
                        </button>
                        <a href="{% if ruleset %}{% url 'rules:ruleset_detail' ruleset.pk %}{% else %}{% url 'rules:ruleset_list' %}{% endif %}" class="btn btn-ghost">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
